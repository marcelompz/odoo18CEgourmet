services:
  web9049:
    container_name: ${WEB_HOST}
    image: odoo-migracion-test:18.0
    build:
      context: ./
      dockerfile: Dockerfile
    depends_on:
      - db5771
    ports:
      - "${WEB_PORT}:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - /mnt/addons:/mnt/extra-addons
      - ${WEB_ADDONS_CUSTOMIZE}:/mnt/extra-addons-customize
      - ${WEB_ADDONS_L10NPY}:/mnt/extra-addons-l10py
      - ./migracion:/mnt/migracion
    environment:
      - HOST=${DB_HOST}
      - USER=${DB_USER}
      - PASSWORD=${DB_PASSWD}
      - PGHOST=${DB_HOST}
      - PGPORT=5432
      - PGDATABASE=${DB_NAME}
      - PGPASSWORD=${DB_PASSWD}
      - TZ=Argentina/Buenos_Aires
      - DEBIAN_FRONTEND=noninteractive
#    restart: unless-stopped
  db5771:
    container_name: ${DB_HOST}
    image: ${DB_IMAGE}:${DB_TAG}
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWD}
      - POSTGRES_USER=${DB_USER}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=Argentina/Buenos_Aires
      - DEBIAN_FRONTEND=noninteractive
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
#    restart: always

  init:
    container_name: odoo_init_db_18
    image: odoo-migracion-test:18.0
    depends_on:
      - db5771
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - /mnt/addons:/mnt/extra-addons
      - ${WEB_ADDONS_CUSTOMIZE}:/mnt/extra-addons-customize
      - ${WEB_ADDONS_L10NPY}:/mnt/extra-addons-l10py
      - ./init_prod_db.sh:/init_prod_db.sh:ro
      - ./modules.conf:/modules.conf:ro
      - ./migracion:/mnt/migracion
    environment:
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWD=${DB_PASSWD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    command: >
      bash -c "
        pip3 install --break-system-packages tu-ruc-python-client &&
        bash /init_prod_db.sh &&
        touch /tmp/init_completed
      "
    restart: "no"

volumes:
  odoo-db-data:
    driver: local
    driver_opts:
      type: none
      device: ${DB_VOLUMES}
      o: bind
  odoo-web-data:
    driver: local
    driver_opts:
      type: none
      device: ${WEB_VOLUMES}
      o: bind
